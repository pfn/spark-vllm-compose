      vllm serve
        /models/MiniMax-M2.7
        --served-model-name "MiniMax-M2.7:FP8"
        --max-model-len 196608
        --max-num-seqs 4
        --enable-prefix-caching
        --gpu-memory-utilization 0.700
        --port 8000
        --host 0.0.0.0
        --load-format fastsafetensors
        --kv-cache-dtype fp8_e4m3
        --enable-chunked-prefil
        --enable-auto-tool-choice
        --tool-call-parser qwen3_coder
        --reasoning-parser qwen3
        --max-num-batched-tokens 8192
        --trust-remote-code
        --tensor-parallel-size 2
        --nnodes 2 --node-rank 0 --master-addr node1 --master-port 54321
        -O3

  vllm-35b:
    <<: *vllm-template
    command: >
      vllm serve
        /models/Qwen3.6-35B-A3B-FP8
        --served-model-name "Qwen3.5 35B:FP8"
        --max-model-len 262144
        --max-num-seqs 4
        --enable-prefix-caching
        --gpu-memory-utilization 0.6
        --port 8000
        --host 0.0.0.0
        --load-format fastsafetensors
        --kv-cache-dtype fp8_e4m3
        --enable-chunked-prefil
        --enable-auto-tool-choice
        --tool-call-parser qwen3_coder
        --reasoning-parser qwen3
        --max-num-batched-tokens 8192
        --trust-remote-code
        --mm-encoder-tp-mode data
        -O3

  vllm-noray:
    <<: *vllm-template
    command: >
      /launch-cluster.sh vllm serve
        /models/Qwen3.5-397B-A17B-int4-AutoRound
        --served-model-name "Qwen3.5 397B:int4"
        --max-model-len 262144
        --max-num-seqs 4
        --enable-prefix-caching
        --gpu-memory-utilization 0.909
        --port 8000
        --host 0.0.0.0
        --load-format safetensors
        --kv-cache-dtype fp8_e4m3
        --dtype auto
        --enable-chunked-prefil
        --enable-auto-tool-choice
        --tool-call-parser qwen3_coder
        --reasoning-parser qwen3
        --max-num-batched-tokens 16384
        --trust-remote-code
        --mm-encoder-tp-mode data
        --tensor-parallel-size 2
        --nnodes 2 --node-rank 0 --master-addr node1 --master-port 54321

#--speculative-config '{"method":"qwen3_next_mtp","num_speculative_tokens":2}'
  vllm-gemma:
    <<: *vllm-template
    profiles: ["ignore"]
    command: >
      vllm serve
        /models/gemma-4-31B-it-NVFP4
        --served-model-name gemma-4-31B-it
        --max-model-len 262144
        --enable-prefix-caching
        --gpu-memory-utilization 0.6
        --port 8000
        --host 0.0.0.0
        --load-format fastsafetensors
        --kv-cache-dtype fp8_e4m3
        --enable-chunked-prefil
        --max-num-batched-tokens 8192
        --trust-remote-code
        --mm-encoder-tp-mode data
        --distributed-executor-backend ray
